seed: 2
model: dm

# Decomposition rule
decomposition:
n_primals:

# Optimizer
max_iter: 100000 # 300000->100000 5/26 수정. 총 학습 횟수 축소. 결과 보고 수정 가능.
g_lr: 2e-4
d_lr: 8e-4
ac_lr: 2e-4
adam_betas: [0.0, 0.9]

# Trainer
trainer:
  resume: 
  force_resume: False
  work_dir: /content/drive/MyDrive/dmfont_exp/result/dm # Colab 사용에 맞게 드라이브로 주소 변경. 5/26.
  # Losses
  pixel_loss_type: l1
  pixel_w: 0.1
  gan_w: 1.0
  fm_layers: all
  fm_w: 1.0
  ac_w: 0.1
  ac_gen_w: 0.1
  fact_const_w: 0.
  # Display
  save: all-last
  print_freq: 1000
  val_freq: 5000 # 10000 -> 5000 5/26 수정. 축소된 데이터에 맞게 두배 더 자주 검증
  save_freq: 10000 # 50000 -> 10000 5/26 수정. 10000번마다 저장.
  tb_freq: 100

# Generator
gen:
  n_heads: 3

# Dataloader
dset:
  loader:
    batch_size: 8
    num_workers: 2 # 16 -> 2 5/26 수정. colab에 맞게.
  train:
    n_in_s: 3
    n_in_min: 1
    n_in_max: 4
